# PostgreSQL OLAP configuration — tuned for TPC-H on AMD EPYC 9555P (64C/377GB RAM, NVMe)
# Optimised for complex analytical queries with large sorts and hash joins.

# Connections
listen_addresses = '*'
max_connections = 64

# Memory — large shared_buffers and work_mem for analytics
shared_buffers = 200GB
effective_cache_size = 300GB
work_mem = 4GB
maintenance_work_mem = 8GB
huge_pages = try

# WAL — minimal for load-only workloads; disable replication
wal_level = minimal
max_wal_senders = 0
wal_buffers = 1024MB
min_wal_size = 20GB
max_wal_size = 40GB
checkpoint_completion_target = 0.9
synchronous_commit = local

# Parallelism — push all cores into analytical queries
max_worker_processes = 128
max_parallel_workers = 64
max_parallel_workers_per_gather = 16
max_parallel_maintenance_workers = 16

# Planner
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 64

# JIT — on for long-running analytical queries
jit = on

# Autovacuum — off during benchmarks; schema is loaded once and not modified
autovacuum = off

# Logging — minimal for benchmarks
log_min_duration_statement = -1
logging_collector = off
