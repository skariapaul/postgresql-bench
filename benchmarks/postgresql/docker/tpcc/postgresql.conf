# PostgreSQL OLTP configuration — tuned for TPC-C on AMD EPYC 9555P (64C/377GB RAM, NVMe)
# Optimised for high-concurrency short transactions.

# Connections
listen_addresses = '*'
max_connections = 200

# Memory
shared_buffers = 80GB
effective_cache_size = 280GB
work_mem = 512MB
maintenance_work_mem = 4GB
huge_pages = try

# WAL
wal_buffers = 64MB
wal_compression = on
min_wal_size = 4GB
max_wal_size = 16GB
checkpoint_completion_target = 0.9
checkpoint_warning = 0

# Commit — off gives max throughput; acceptable for benchmarks
synchronous_commit = off

# Parallelism
max_worker_processes = 128
max_parallel_workers = 64
max_parallel_workers_per_gather = 8
max_parallel_maintenance_workers = 16

# Planner
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 64

# JIT — disable; overhead hurts short OLTP transactions
jit = off

# Autovacuum — keep on for OLTP correctness
autovacuum = on
autovacuum_max_workers = 8
autovacuum_vacuum_cost_delay = 2ms

# Logging — minimal for benchmarks
log_min_duration_statement = -1
logging_collector = off
